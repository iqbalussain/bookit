name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npm run rebuild-electron

      - name: Build frontend
        run: npm run build

      - name: Build Electron EXE
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MITC-EXE
          path: |
            dist/*.exe
            release/*.exe
            out/**/*.exe